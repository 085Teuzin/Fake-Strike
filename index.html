<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Operation: Fake Strike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="landscape-warning">
        <p>🔄 gire o celular para o modo PAISAGEM</p>
    </div>

    <div class="top-btns">
        <div id="config-btn-global" class="ctrl-btn interactive">⚙</div>
        <div id="fs-btn-top" class="ctrl-btn interactive">📺</div>
    </div>

    <div id="lobby">
        <h1>FAKE STRIKE</h1>
        <input type="text" id="player-name" placeholder="Nickname" maxlength="10">
        <input type="password" id="player-pass" placeholder="Senha" maxlength="8">
        <div class="char-selection">
            <div class="char-btn selected" data-color="0xff6600">Macho</div>
            <div class="char-btn" data-color="0xff66cc">Femea</div>
        </div>
        <button id="btn-start">Conectar</button>
        <p id="login-error" style="color: #ff4444; font-size: 11px; margin-top: 10px; display: none;"></p>
        <div class="credits">Made By: @085_Teuzinnn</div>
    </div>

    <div id="config-modal" class="interactive">
        <div class="modal-header">
            <h2 style="margin:0; font-size: 16px;">Configurações</h2>
            <button id="close-config" class="opt-btn btn-confirm" style="width: 80px; padding: 5px;">Salvar</button>
        </div>
        <div class="modal-body">
            <div class="setting-section">
                <div class="setting-card-compact">
                    <h3>Gameplay</h3>
                    <div class="setting-row-compact">
                        <label id="fov-label">FOV: 75</label>
                        <input type="range" id="fov-slider" min="60" max="100" step="1" value="75">
                    </div>
                    <div class="setting-row-compact">
                        <label id="sens-label">Sensi: 1.0</label>
                        <input type="range" id="sens-slider" min="0.1" max="4.0" step="0.1" value="1.0">
                    </div>
                </div>

                <div class="setting-card-compact">
                    <h3>Mira</h3>
                    <div class="setting-row-compact">
                        <label>Cor</label>
                        <select id="cross-color">
                            <option value="#ffffff">Branco</option>
                            <option value="#00ff00">Verde</option>
                            <option value="#00ffff">Ciano</option>
                            <option value="#ffff00">Amarelo</option>
                        </select>
                    </div>
                    <div class="setting-row-compact">
                        <label id="cross-size-label">Tamanho: 4px</label>
                        <input type="range" id="cross-size-slider" min="2" max="12" step="1" value="4">
                    </div>
                </div>

                <div class="setting-card-compact">
                    <h3>Controles</h3>
                    <div class="setting-row-compact">
                        <label id="btn-size-label">Tiro: 100px</label>
                        <input type="range" id="btn-size-slider" min="70" max="150" step="5" value="100">
                    </div>
                    <div class="setting-row-compact">
                        <label id="joy-size-label">Joy: 120px</label>
                        <input type="range" id="joy-size-slider" min="80" max="180" step="5" value="120">
                    </div>
                </div>

                <div class="setting-card-compact">
                    <h3>Sistema</h3>
                    <div class="setting-row-compact">
                        <label>FPS</label>
                        <select id="fps-limit">
                            <option value="60">60 FPS</option>
                            <option value="30">30 FPS</option>
                        </select>
                    </div>
                    <div class="btn-grid-compact">
                        <button id="rank-btn" class="opt-btn">RANKING: ON</button>
                        <button id="lobby-btn" class="opt-btn" style="display:none; border-color: #00ff00;">Lobby</button>
                    </div>
                    <button id="exit-btn" class="opt-btn btn-exit" style="width:100%; margin-top:5px;">Sair do Jogo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="online-count">0 ONLINE</div>
        <div id="scoreboard">Kills: 0 | Deaths: 0</div>
        <div id="crosshair-container">
            <div id="dot"></div>
            <div id="hitmarker"></div>
        </div>
        <div id="joystick-area" class="interactive"><div id="joystick-knob"></div></div>
        <div class="interactive"><div id="shoot-btn">TIRO</div></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
