<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Operation: Fake Strike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby">
        <h1>FAKE STRIKE</h1>
        <input type="text" id="player-name" placeholder="NOME DO JOGADOR" maxlength="10">
        <input type="password" id="player-pass" placeholder="SENHA" maxlength="8">
        <div class="char-selection">
            <div class="char-btn selected" data-color="0x00ff00">VERDE (M)</div>
            <div class="char-btn" data-color="0x0000ff">AZUL (M)</div>
            <div class="char-btn" data-color="0x555555">CINZA (M)</div>
            <div class="char-btn" data-color="0xff00ff">ROSA (F)</div>
            <div class="char-btn" data-color="0xffff00">AMARELO (F)</div>
            <div class="char-btn" data-color="0x00ffff">CIANO (F)</div>
        </div>
        <button id="btn-start">ENTRAR / CRIAR</button>
        <p id="login-error" style="color: red; font-size: 11px; margin-top: 10px; display: none;"></p>
    </div>

    <div id="config-modal" class="interactive">
        <h2>Ajustes</h2>
        <div class="setting-row">
            <label id="sens-label">Sensibilidade: 1.0</label>
            <input type="range" id="sens-slider" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <button id="fullscreen-btn" class="opt-btn">Tela Cheia</button>
        <button id="toggle-rank-btn" class="opt-btn">Ocultar Ranking</button>
        <button class="close-modal" id="btn-close-config">FECHAR</button>
    </div>

    <div id="ui-layer">
        <div id="config-btn" class="interactive">⚙</div>
        <div id="online-count">0 ONLINE</div>
        <div id="kill-feed"></div>
        <div id="ranking-box">
            <h3>Top Kills</h3>
            <div id="rank-list"></div>
        </div>
        <div id="scoreboard">Kills: 0 | Deaths: 0</div>
        <div id="crosshair-container">
            <div id="dot"></div>
            <div id="hitmarker"></div>
            <svg id="reload-circle"><circle cx="20" cy="20" r="16"></circle></svg>
        </div>
        <div id="joystick-area" class="interactive"><div id="joystick-knob"></div></div>
        <div class="interactive"><div id="shoot-btn">FOGO</div></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        } }
    </script>
    <script type="module" src="ui.js"></script>
</body>
</html>
