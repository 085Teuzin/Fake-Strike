<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blood Fire - Made By: @085_Teuzinnn</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }

        #landscape-warning { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        @media screen and (orientation: portrait) { #landscape-warning { display: flex; } }

        #lobby { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        #lobby h1 { margin: 0 0 20px 0; letter-spacing: 5px; color: #ff0000; font-size: 24px; }
        #lobby input { padding: 12px; font-size: 14px; border-radius: 5px; border: 1px solid #444; margin-bottom: 8px; text-align: center; background: #222; color: #fff; width: 250px; }
        .char-selection { display: flex; gap: 8px; margin-bottom: 15px; }
        .char-btn { padding: 10px; border: 2px solid #444; border-radius: 5px; background: #222; color: white; font-size: 12px; width: 121px; text-align: center; }
        .char-btn.selected { border-color: #ff0000; background: #1a331a; }
        #btn-start { padding: 12px; background: #ff0000; border: none; border-radius: 5px; font-weight: bold; width: 250px; cursor: pointer; }
        .credits { margin-top: 15px; font-size: 11px; color: #666; letter-spacing: 1px; }

        #config-modal { position: fixed; top: 5%; bottom: 5%; left: 10%; right: 10%; background: rgba(10, 10, 10, 0.95); border-radius: 10px; border: 1px solid #ff0000; color: white; z-index: 2000; display: none; flex-direction: column; }
        .modal-header { padding: 10px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 10px; touch-action: pan-y !important; }

        .modal-body::-webkit-scrollbar { width: 5px; }
        .modal-body::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }

        .setting-card-compact { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #ff0000; }
        .setting-card-compact h3 { margin: 0 0 8px 0; font-size: 12px; color: #ff0000; }
        .setting-row-compact { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .setting-row-compact label { font-size: 11px; color: #ccc; white-space: nowrap; min-width: 80px; }

        input[type=range] { flex: 1; accent-color: #ff0000; height: 4px; }
        select { background: #333; color: white; border: 1px solid #555; padding: 4px; border-radius: 4px; font-size: 11px; }

        #ui-layer { position: fixed; inset: 0; z-index: 20; pointer-events: none; display: none; }
        .interactive { pointer-events: auto; }
        .top-btns { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; z-index: 1001; }
        .ctrl-btn { width: 38px; height: 38px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid #ff0000; cursor: pointer; }

        #ranking-container { position: absolute; top: 65px; left: 15px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 5px; border-left: 3px solid #ff0000; color: white; font-size: 11px; min-width: 120px; z-index: 1001; pointer-events: auto; }
        #ranking-container h4 { margin: 0 0 5px 0; color: #ff0000; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 3px; font-family: monospace; }
        .rank-item:last-child { margin-bottom: 0; }

        #online-count { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 12px; font-weight: bold; }
        #scoreboard { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); padding: 8px; color: white; border-radius: 5px; font-size: 11px; border-right: 3px solid #ff0000; }

        #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; }
        #hitmarker { position: absolute; top: 50%; left: 50%; width: 25px; height: 25px; border: 2px solid red; transform: translate(-50%, -50%) rotate(45deg); display: none; }

        #joystick-area { position: absolute; bottom: 30px; left: 30px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        #joystick-knob { width: 40%; height: 40%; background: #fff; border-radius: 50%; opacity: 0.3; }
        #shoot-btn { position: absolute; bottom: 30px; right: 30px; background: rgba(0,255,0,0.1); border: 2px solid rgba(0,255,0,0.3); border-radius: 50%; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .btn-grid-compact { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
        .opt-btn { background: #222; border: 1px solid #444; padding: 8px; color: white; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .btn-exit { background: #440000; border-color: #ff0000; }
    </style>
</head>
<body>
    <div id="landscape-warning">
        <p>🔄 gire o celular para o modo PAISAGEM</p>
    </div>

    <div class="top-btns">
        <div id="config-btn-global" class="ctrl-btn interactive">⚙</div>
        <div id="fs-btn-top" class="ctrl-btn interactive">📺</div>
    </div>

    <div id="ranking-container" style="display: none;">
        <h4>TOP 3 KILLS</h4>
        <div id="ranking-list"></div>
    </div>

    <div id="lobby">
        <h1>Blood Fire</h1>
        <input type="text" id="player-name" placeholder="Nickname" maxlength="10">
        <input type="password" id="player-pass" placeholder="Senha" maxlength="8">
        <div class="char-selection">
            <div class="char-btn selected" data-color="0xff6600">Homem</div>
            <div class="char-btn" data-color="0xff66cc">Mulher</div>
        </div>
        <button id="btn-start">Criar / Entrar</button>
        <p id="login-error" style="color: #ff4444; font-size: 11px; margin-top: 10px; display: none;"></p>
        <div class="credits">Made By: @085_Teuzinnn</div>
    </div>

    <div id="config-modal" class="interactive">
        <div class="modal-header">
            <h2 style="margin:0; font-size: 16px;">Configurações</h2>
            <button id="close-config" class="opt-btn btn-confirm" style="width: 80px; padding: 5px;">Salvar</button>
        </div>
        <div class="modal-body">
            <div class="setting-section">
                <div class="setting-card-compact">
                    <h3>Gameplay</h3>
                    <div class="setting-row-compact">
                        <label id="fov-label">FOV: 75</label>
                        <input type="range" id="fov-slider" min="60" max="100" step="1" value="75">
                    </div>
                    <div class="setting-row-compact">
                        <label id="sens-label">Sensi: 1.0</label>
                        <input type="range" id="sens-slider" min="0.1" max="4.0" step="0.1" value="1.0">
                    </div>
                </div>

                <div class="setting-card-compact">
                    <h3>Mira</h3>
                    <div class="setting-row-compact">
                        <label>Cor</label>
                        <select id="cross-color">
                            <option value="#ff00ff">Rosa</option>
                            <option value="#00ff00">Verde</option>
                            <option value="#ff0000">Vermelho</option>
                            <option value="#ffff00">Amarelo</option>
                        </select>
                    </div>
                    <div class="setting-row-compact">
                        <label id="cross-size-label">Tamanho: 3px</label>
                        <input type="range" id="cross-size-slider" min="2" max="12" step="1" value="3">
                    </div>
                </div>

                <div class="setting-card-compact">
                    <h3>Controles</h3>
                    <div class="setting-row-compact">
                        <label id="btn-size-label">Tiro: 85px</label>
                        <input type="range" id="btn-size-slider" min="70" max="150" step="5" value="85">
                    </div>
                    <div class="setting-row-compact">
                        <label id="joy-size-label">Joy: 120px</label>
                        <input type="range" id="joy-size-slider" min="80" max="180" step="5" value="120">
                    </div>
                </div>

                <div class="setting-card-compact">
                    <h3>Sistema</h3>
                    <div class="setting-row-compact">
                        <label>FPS</label>
                        <select id="fps-limit">
                            <option value="90">90 FPS</option>
                            <option value="60">60 FPS</option>
                            <option value="30">30 FPS</option>
                        </select>
                    </div>
                    <div class="btn-grid-compact">
                        <button id="rank-btn" class="opt-btn">RANKING: ON</button>
                        <button id="lobby-btn" class="opt-btn" style="display:none; border-color: #ff0000;">Lobby</button>
                    </div>
                    <button id="exit-btn" class="opt-btn btn-exit" style="width:100%; margin-top:5px;">Sair do Jogo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="online-count">0 ONLINE</div>
        <div id="scoreboard">Kill: 0 | Death: 0</div>
        <div id="crosshair-container">
            <div id="dot"></div>
            <div id="hitmarker"></div>
        </div>
        <div id="joystick-area" class="interactive"><div id="joystick-knob"></div></div>
        <div class="interactive"><div id="shoot-btn">Tiro</div></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, onDisconnect, update, get } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyBqRAsWfP4w-r82PZOaJcDck7W8Aeph3p8",
            authDomain: "teuzin-games.firebaseapp.com",
            databaseURL: "https://teuzin-games-default-rtdb.firebaseio.com",
            projectId: "teuzin-games",
            storageBucket: "teuzin-games.firebasestorage.app",
            messagingSenderId: "548192563345",
            appId: "1:548192563345:web:e729e39f9f266aa6a68f30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const nameInput = document.getElementById('player-name');
        const passInput = document.getElementById('player-pass');
        let savedName = localStorage.getItem('fs_name') || "";
        let savedPass = localStorage.getItem('fs_pass') || "";

        if (savedName) {
            nameInput.value = savedName;
            nameInput.readOnly = true;
            passInput.value = savedPass;
        }

        let myName = savedName;
        let myColor = localStorage.getItem('fs_color') || "0xff6600";
        let sensitivity = parseFloat(localStorage.getItem('fs_sens')) || 1.0;
        let fov = parseInt(localStorage.getItem('fs_fov')) || 75;
        let crossSize = localStorage.getItem('fs_cross_size') || 3;
        let crossColor = localStorage.getItem('fs_cross_color') || "#ffffff";
        let btnSize = localStorage.getItem('fs_btn_size') || 85;
        let joySize = localStorage.getItem('fs_joy_size') || 100;
        let rankVisible = localStorage.getItem('fs_rank_hide') !== "true";
        let kills = 0, deaths = 0, inGame = false, gameCam = null;
        let localPlayerDead = false;

        const spawnPoints = [
            {x:-80, z:-80}, {x:80, z:-80}, {x:-80, z:80}, {x:80, z:80},
            {x:0, z:-90}, {x:0, z:90}, {x:-90, z:0}, {x:90, z:0},
            {x:-45, z:-45}, {x:45, z:45}, {x:-45, z:45}, {x:45, z:-45}
        ];
        const getRandomSpawn = () => spawnPoints[Math.floor(Math.random()*spawnPoints.length)];

        function applySavedUI() {
            document.getElementById('fov-slider').value = fov;
            document.getElementById('fov-label').innerText = `FOV: ${fov}`;
            document.getElementById('sens-slider').value = sensitivity;
            document.getElementById('sens-label').innerText = `Sensi: ${parseFloat(sensitivity).toFixed(1)}`;
            document.getElementById('cross-color').value = crossColor;
            document.getElementById('dot').style.backgroundColor = crossColor;
            document.getElementById('cross-size-slider').value = crossSize;
            document.getElementById('dot').style.width = crossSize + 'px';
            document.getElementById('dot').style.height = crossSize + 'px';
            document.getElementById('cross-size-label').innerText = `Tamanho: ${crossSize}px`;
            document.getElementById('btn-size-slider').value = btnSize;
            document.getElementById('shoot-btn').style.width = btnSize + 'px';
            document.getElementById('shoot-btn').style.height = btnSize + 'px';
            document.getElementById('btn-size-label').innerText = `Botão de Tiro: ${btnSize}px`;
            document.getElementById('joy-size-slider').value = joySize;
            document.getElementById('joystick-area').style.width = joySize + 'px';
            document.getElementById('joystick-area').style.height = joySize + 'px';
            document.getElementById('joy-size-label').innerText = `Joystick: ${joySize}px`;
            document.getElementById('rank-btn').innerText = rankVisible ? "RANKING: ON" : "RANKING: OFF";
        }
        applySavedUI();

        const lobby = document.getElementById('lobby');
        const ui = document.getElementById('ui-layer');
        const configModal = document.getElementById('config-modal');
        const lobbyBtn = document.getElementById('lobby-btn');
        const rankingContainer = document.getElementById('ranking-container');
        const rankingList = document.getElementById('ranking-list');

        document.getElementById('fs-btn-top').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        document.getElementById('fov-slider').oninput = (e) => {
            fov = e.target.value;
            document.getElementById('fov-label').innerText = `FOV: ${fov}`;
            if(gameCam) { gameCam.fov = fov; gameCam.updateProjectionMatrix(); }
            localStorage.setItem('fs_fov', fov);
        };

        document.getElementById('sens-slider').oninput = (e) => {
            sensitivity = e.target.value;
            document.getElementById('sens-label').innerText = `Sensi: ${parseFloat(sensitivity).toFixed(1)}`;
            localStorage.setItem('fs_sens', sensitivity);
        };

        document.getElementById('cross-color').onchange = (e) => {
            crossColor = e.target.value;
            document.getElementById('dot').style.backgroundColor = crossColor;
            localStorage.setItem('fs_cross_color', crossColor);
        };

        document.getElementById('cross-size-slider').oninput = (e) => {
            crossSize = e.target.value;
            document.getElementById('dot').style.width = crossSize + 'px';
            document.getElementById('dot').style.height = crossSize + 'px';
            document.getElementById('cross-size-label').innerText = `Tamanho: ${crossSize}px`;
            localStorage.setItem('fs_cross_size', crossSize);
        };

        document.getElementById('btn-size-slider').oninput = (e) => {
            btnSize = e.target.value;
            const btn = document.getElementById('shoot-btn');
            btn.style.width = btnSize + 'px'; btn.style.height = btnSize + 'px';
            document.getElementById('btn-size-label').innerText = `Botão de Tiro: ${btnSize}px`;
            localStorage.setItem('fs_btn_size', btnSize);
        };

        document.getElementById('joy-size-slider').oninput = (e) => {
            joySize = e.target.value;
            const joy = document.getElementById('joystick-area');
            joy.style.width = joySize + 'px'; joy.style.height = joySize + 'px';
            document.getElementById('joy-size-label').innerText = `Joystick: ${joySize}px`;
            localStorage.setItem('fs_joy_size', joySize);
        };

        document.getElementById('config-btn-global').onclick = () => {
            lobbyBtn.style.display = inGame ? "block" : "none";
            configModal.style.display = 'flex';
        };
        document.getElementById('close-config').onclick = () => configModal.style.display = 'none';

        document.getElementById('rank-btn').onclick = () => {
            rankVisible = !rankVisible;
            localStorage.setItem('fs_rank_hide', !rankVisible);
            document.getElementById('rank-btn').innerText = rankVisible ? "RANKING: ON" : "RANKING: OFF";
            if (inGame) {
                rankingContainer.style.display = rankVisible ? 'block' : 'none';
            }
        };
        document.getElementById('lobby-btn').onclick = () => location.reload();
        document.getElementById('exit-btn').onclick = () => { if(confirm("Sair do jogo?")) window.close(); };

        document.querySelectorAll('.char-btn').forEach(btn => {
            if(btn.dataset.color === myColor) btn.classList.add('selected');
            btn.onclick = () => {
                document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                myColor = btn.dataset.color;
                localStorage.setItem('fs_color', myColor);
            };
        });

        document.getElementById('btn-start').onclick = async () => {
            const user = nameInput.value.trim();
            const pass = passInput.value.trim();
            if(user.length < 3) return;
            const snap = await get(ref(db, `users/${user}`));
            const data = snap.val();
            if(data && data.pass !== pass) {
                document.getElementById('login-error').innerText = "Senha Incorreta!";
                document.getElementById('login-error').style.display = 'block';
                return;
            }
            if(!data) await set(ref(db, `users/${user}`), { pass: pass, kills: 0, deaths: 0 });
            localStorage.setItem('fs_name', user);
            localStorage.setItem('fs_pass', pass);
            myName = user; kills = data?.kills || 0; deaths = data?.deaths || 0;
            lobby.style.display = 'none'; ui.style.display = 'block'; inGame = true;
            if (rankVisible) rankingContainer.style.display = 'block';
            initGame();
        };

        function createHealthBarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222222';
            ctx.fillRect(0, 0, 128, 16);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(2, 2, 124, 12);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function updateHealthBarTexture(texture, hp) {
            const canvas = texture.image;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222222';
            ctx.fillRect(0, 0, 128, 16);
            if (hp > 0) {
                if (hp > 50) ctx.fillStyle = '#00ff00';
                else if (hp > 20) ctx.fillStyle = '#ffff00';
                else ctx.fillStyle = '#ff0000';
                const width = (hp / 100) * 124;
                ctx.fillRect(2, 2, width, 12);
            }
            texture.needsUpdate = true;
        }

        function initGame() {
            const playerRef = ref(db, `players/${myName}`);
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

            const camera = new THREE.PerspectiveCamera(fov, window.innerWidth/window.innerHeight, 0.1, 1000);
            gameCam = camera;
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const startSpawn = getRandomSpawn();
            camera.position.set(startSpawn.x, 1.7, startSpawn.z);

            const textureLoader = new THREE.TextureLoader();
            const floorTex = textureLoader.load('chao.jpg');
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ map: floorTex });
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotateX(-Math.PI/2);
            scene.add(floor);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);
            
            const gunGroup = new THREE.Group();
            const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.18, 0.4), new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.5}));
            const gBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5), new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.3}));
            gBarrel.rotation.x = Math.PI/2; gBarrel.position.z = -0.35;
            const gHandle = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x111111}));
            gHandle.position.set(0, -0.15, 0);
            gunGroup.add(gBody, gBarrel, gHandle); gunGroup.position.set(0.35, -0.4, -0.7);
            camera.add(gunGroup); scene.add(camera);

            const otherPlayers = {}, hitboxes = [];
            const sniperSound = new Audio('sniper.mp3'), hitSound = new Audio('hit.mp3');

            onValue(ref(db, 'players'), (snapshot) => {
                const data = snapshot.val(); if (!data) return;
                document.getElementById('online-count').innerText = `${Object.keys(data).length} ONLINE`;
                
                if (data[myName]?.isDead && !localPlayerDead) {
                    localPlayerDead = true;
                    deaths++; 
                    update(ref(db, `users/${myName}`), { deaths: deaths });
                    
                    setTimeout(() => {
                        const resp = getRandomSpawn(); 
                        camera.position.set(resp.x, 1.7, resp.z);
                        update(playerRef, { isDead: false, hp: 100, x: resp.x, y: 1.7, z: resp.z }).then(() => {
                            localPlayerDead = false;
                        });
                    }, 200);
                }

                document.getElementById('scoreboard').innerText = `Kills: ${kills} | Deaths: ${deaths}`;
                
                for (let id in data) {
                    if (id === myName) continue;
                    const pCol = parseInt(data[id].color || "0xff6600");
                    const currentHp = data[id].hp !== undefined ? data[id].hp : 100;
                    
                    if (!otherPlayers[id]) {
                        const group = new THREE.Group();
                        const skinMat = new THREE.MeshStandardMaterial({color: pCol, roughness: 0.7});
                        const clothesMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.8});

                        const bHead = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
                        bHead.position.y = 1.1;
                        bHead.userData = { type: 'head', parentId: id };

                        const bBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.9, 0.4), clothesMat);
                        bBody.position.y = 0.4;
                        bBody.userData = { type: 'body', parentId: id };

                        const bArmL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), skinMat);
                        bArmL.position.set(-0.5, 0.4, 0);
                        bArmL.userData = { type: 'body', parentId: id };

                        const bArmR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), skinMat);
                        bArmR.position.set(0.5, 0.4, 0);
                        bArmR.userData = { type: 'body', parentId: id };

                        const bLegL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), clothesMat);
                        bLegL.position.set(-0.2, -0.4, 0);
                        bLegL.userData = { type: 'body', parentId: id };

                        const bLegR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), clothesMat);
                        bLegR.position.set(0.2, -0.4, 0);
                        bLegR.userData = { type: 'body', parentId: id };

                        const hbTex = createHealthBarTexture();
                        const hbMat = new THREE.SpriteMaterial({ map: hbTex, depthTest: false });
                        const hbSprite = new THREE.Sprite(hbMat);
                        hbSprite.position.set(0, 1.6, 0);
                        hbSprite.scale.set(0.8, 0.1, 1);

                        group.add(bBody, bHead, bArmL, bArmR, bLegL, bLegR, hbSprite);
                        scene.add(group); 
                        
                        otherPlayers[id] = { group, parts: [bBody, bHead, bArmL, bArmR, bLegL, bLegR], hbTex, hbSprite }; 
                        hitboxes.push(bBody, bHead, bArmL, bArmR, bLegL, bLegR);
                    }
                    
                    const p = otherPlayers[id];
                    updateHealthBarTexture(p.hbTex, currentHp);

                    if(data[id].isDead) { 
                        p.group.rotation.x = -Math.PI/2;
                        p.parts.forEach(part => part.material.color.set(0x551111));
                        p.hbSprite.visible = false;
                    } else { 
                        p.group.rotation.x = 0; 
                        p.group.position.set(data[id].x, data[id].y - 0.7, data[id].z); 
                        p.group.rotation.y = data[id].ry; 
                        p.hbSprite.visible = true;
                        
                        const speed = 0.005;
                        const time = Date.now() * speed;
                        p.parts[2].rotation.x = Math.sin(time) * 0.5; 
                        p.parts[3].rotation.x = -Math.sin(time) * 0.5; 
                        p.parts[4].rotation.x = -Math.sin(time) * 0.6; 
                        p.parts[5].rotation.x = Math.sin(time) * 0.6; 

                        p.parts[0].material.color.set(0x222222);
                        p.parts[1].material.color.set(pCol);
                    }
                }

                for(let id in otherPlayers) {
                    if(!data[id]) {
                        scene.remove(otherPlayers[id].group);
                        otherPlayers[id].parts.forEach(part => {
                            const index = hitboxes.indexOf(part);
                            if(index > -1) hitboxes.splice(index, 1);
                        });
                        otherPlayers[id].hbTex.dispose();
                        delete otherPlayers[id];
                    }
                }
            });

            onValue(ref(db, 'users'), (snapshot) => {
                const data = snapshot.val(); if (!data) return;
                const arr = Object.keys(data).map(key => ({ name: key, kills: data[key].kills || 0 })).sort((a, b) => b.kills - a.kills).slice(0, 3);
                rankingList.innerHTML = arr.map((p, idx) => `<div class="rank-item"><span>${idx + 1}. ${p.name}</span><span>${p.kills} K</span></div>`).join('');
            });

            onDisconnect(playerRef).remove();
            let canShoot = true, joystickId = null, lookId = null, moveFwd = 0, moveSide = 0, lookYaw = 0, lookPitch = 0, lastX, lastY;

            window.addEventListener('touchstart', (e) => {
                if(configModal.style.display === 'flex') return;
                for (let t of e.changedTouches) {
                    if (t.target === document.getElementById('shoot-btn')) disparar();
                    else if (t.clientX < window.innerWidth/2) joystickId = t.identifier;
                    else { lookId = t.identifier; lastX = t.clientX; lastY = t.clientY; }
                }
            });

            window.addEventListener('touchmove', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joystickId) {
                        const rect = document.getElementById('joystick-area').getBoundingClientRect();
                        const dx = t.clientX - (rect.left + rect.width/2), dy = t.clientY - (rect.top + rect.height/2);
                        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width/2); const ang = Math.atan2(dy, dx);
                        document.getElementById('joystick-knob').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                        moveFwd = -Math.sin(ang) * (dist/(rect.width/2)); moveSide = Math.cos(ang) * (dist/(rect.width/2));
                    }
                    if (t.identifier === lookId) {
                        lookYaw -= (t.clientX - lastX) * (0.005 * sensitivity);
                        lookPitch = Math.max(-1.4, Math.min(1.4, lookPitch - (t.clientY - lastY) * (0.005 * sensitivity)));
                        lastX = t.clientX; lastY = t.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let t of e.changedTouches) {
                    if (t.identifier === joystickId) { joystickId = null; moveFwd = 0; moveSide = 0; document.getElementById('joystick-knob').style.transform = ''; }
                    if (t.identifier === lookId) lookId = null;
                }
            });

            async function disparar() {
                if (!canShoot || localPlayerDead) return; canShoot = false;
                sniperSound.pause(); sniperSound.currentTime = 0; sniperSound.play().catch(()=>{});
                gunGroup.position.z += 0.15; setTimeout(() => gunGroup.position.z -= 0.15, 100);
                
                const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const hits = raycaster.intersectObjects(hitboxes);
                
                if (hits.length > 0) {
                    const hit = hits[0].object; const tId = hit.userData.parentId;
                    const snap = await get(ref(db, `players/${tId}`)); const pD = snap.val();
                    
                    if(pD && !pD.isDead) {
                        hitSound.pause(); hitSound.currentTime = 0; hitSound.play().catch(()=>{});
                        document.getElementById('hitmarker').style.display = 'block'; setTimeout(() => document.getElementById('hitmarker').style.display = 'none', 150);
                        
                        let damage = hit.userData.type === 'head' ? 100 : 34;
                        let nHP = (pD.hp !== undefined ? pD.hp : 100) - damage;
                        
                        if(nHP <= 0) {
                            await update(ref(db, `players/${tId}`), { isDead: true, hp: 0, lastKiller: myName });
                            kills++; 
                            update(ref(db, `users/${myName}`), { kills: kills });
                        } else {
                            update(ref(db, `players/${tId}`), { hp: nHP });
                        }
                    }
                }
                setTimeout(() => { canShoot = true; }, 600);
            }

            function animate() {
                requestAnimationFrame(animate);
                camera.rotation.order = 'YXZ'; camera.rotation.y = lookYaw; camera.rotation.x = lookPitch;
                const dir = new THREE.Vector3(moveSide, 0, -moveFwd).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), lookYaw));
                camera.position.addScaledVector(dir, 0.14); 
                camera.position.y = 1.7;
                
                if (!localPlayerDead) {
                    const myCurrentSnapRef = ref(db, `players/${myName}`);
                    get(myCurrentSnapRef).then((s) => {
                        const currentData = s.val();
                        const currentHp = (currentData && currentData.hp !== undefined) ? currentData.hp : 100;
                        set(playerRef, { x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y, isDead: false, hp: currentHp, color: myColor });
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }
    </script>
</body>
</html>
